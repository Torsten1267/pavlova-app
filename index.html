function buildPDFContent(doc, o) {
  const W=210, ml=18, mr=18, cw=W-ml-mr;
  const beige=[196,191,182], dk=[50,50,50], mid=[120,120,120], lg=[235,233,230], grn=[29,158,117], amr=[180,120,30];
  doc.setFillColor(...beige); doc.rect(0,0,W,36,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(...dk);
  doc.text('Pavlova Cafe Berlin', ml+6, 16);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(...mid);
  doc.text('Kurfuerstendamm 210  |  10719 Berlin  |  Tel: 030 85621805', ml+6, 22);
  doc.text('Bestellung@pavlovacafe.de', ml+6, 27);
  doc.setFillColor(255,255,255); doc.rect(0,36,W,14,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...dk);
  doc.text('BESTELLUNG  ' + o.id, ml, 47);
  doc.setDrawColor(...beige); doc.setLineWidth(0.5); doc.line(ml,51,W-mr,51);
  let y=60;
  const cols=[ml,ml+52,ml+104,ml+155];
  const labels=['LIEFERANT','BESTELLDATUM','ANLIEFERUNG','BESTELLER'];
  const vals=[o.supplier,o.date,o.delivDate||o.date,o.user];
  labels.forEach((l,i)=>{ doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...mid); doc.text(l,cols[i],y); doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(...dk); doc.text((vals[i]||'').substring(0,22),cols[i],y+5); });
  const sup=SUPPLIERS[o.supplier];
  if(sup){ doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...mid); doc.text(sup.email.substring(0,30),cols[0],y+10); }
  y=82;
  doc.setFillColor(...beige); doc.roundedRect(ml,y-5,cw,8,1,1,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...dk);
  doc.text('POS',ml+3,y); doc.text('ARTIKEL',ml+15,y);
  doc.text('EINHEIT',ml+cw-52,y); doc.text('MENGE',ml+cw-20,y);
  y+=8;
  const showNr=o.supplier.indexOf('Preuss')>=0||o.supplier.indexOf('Getraenke')>=0;
  let pos=1, lastCat='';
  o.items.forEach(item=>{
    if(y>268){doc.addPage();y=20;}
    if(item.cat&&item.cat!==lastCat){lastCat=item.cat;doc.setFillColor(...lg);doc.rect(ml,y-3.5,cw,6.5,'F');doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...mid);doc.text(item.cat.toUpperCase(),ml+3,y+1);y+=9;}
    if(y>268){doc.addPage();y=20;}
    if(pos%2===0){doc.setFillColor(250,249,247);doc.rect(ml,y-4,cw,7.5,'F');}
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...dk);
    doc.text(String(pos),ml+3,y);
    let nm=item.name;if(showNr&&item.nr)nm+=' (Nr.'+item.nr+')';if(nm.length>52)nm=nm.substring(0,52)+'...';
    doc.text(nm,ml+15,y);
    let ut=item.unit;if(ut.length>18)ut=ut.substring(0,18);doc.text(ut,ml+cw-52,y);
    doc.setDrawColor(...beige);doc.setLineWidth(0.3);doc.roundedRect(ml+cw-25,y-4,18,7,1,1,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...grn);
    doc.text(String(item.qty),ml+cw-16,y,{align:'center'});
    if(item.hint){y+=5;doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(...amr);doc.text('  Hinweis: '+item.hint.substring(0,60),ml+15,y);}
    pos++;y+=8;
  });
  if(o.note&&y<270){y+=4;doc.setFillColor(255,252,235);doc.roundedRect(ml,y-4,cw,11,1.5,1.5,'F');doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...amr);doc.text('HINWEIS:',ml+4,y+1);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...dk);doc.text(doc.splitTextToSize(o.note,cw-36),ml+28,y+1);}
  doc.setFillColor(...beige);doc.rect(0,279,W,18,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...dk);
  doc.text('Pavlova Cafe Berlin  |  Kurfuerstendamm 210, 10719 Berlin  |  Bestellung@pavlovacafe.de',W/2,285,{align:'center'});
  doc.setTextColor(...mid);
  doc.text('Bestellung '+o.id+' vom '+o.date+' um '+o.time+'  |  Besteller: '+o.user,W/2,291,{align:'center'});
}

function generatePDF(o, doDownload) {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  buildPDFContent(doc,o);
  const fname='Bestellung_'+o.id+'_'+o.supplier.replace(/\s+/g,'_')+'_'+o.date.replace(/\./g,'-')+'.pdf';
  if(doDownload) doc.save(fname);
  return fname;
}

function pdfShow(){const keys=Object.keys(wk);if(!keys.length){mel("Warenkorb ist leer");return;}const sup=SUPPLIERS[curL],items=keys.map(id=>{const p=sup.products.find(x=>x.id==id);return{name:p.name,qty:wk[id],unit:p.unit,nr:p.nr||"",cat:p.cat,hint:p.hint||""};});const dd=new Date();dd.setDate(dd.getDate()+1);const o={id:"Vorschau",supplier:curL,email:sup.email,user:aN.name,date:new Date().toLocaleDateString("de-DE"),time:"",delivDate:dd.toLocaleDateString("de-DE"),items,note:(document.getElementById("notiz")||{value:""}).value};const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});buildPDFContent(doc,o);doc.save("Bestellung_Vorschau.pdf");mel("PDF wird gespeichert...");}
function getPdfB64(o){const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});buildPDFContent(doc,o);return doc.output("datauristring").split(",")[1];}

async function bestellen(){
  const keys=Object.keys(wk);if(!keys.length)return;
  const sup=SUPPLIERS[curL],items=keys.map(id=>{const p=sup.products.find(x=>x.id==id);return{name:p.name,qty:wk[id],unit:p.unit,nr:p.nr||"",cat:p.cat,hint:p.hint||""};});
  const dd=new Date();dd.setDate(dd.getDate()+1);
  const o={id:"B-"+(bestellungen.length+101),supplier:curL,email:sup.email,user:aN.name,date:new Date().toLocaleDateString("de-DE"),time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),delivDate:dd.toLocaleDateString("de-DE"),items,note:(document.getElementById("notiz")||{value:""}).value,status:"offen"};
  const b64=getPdfB64(o);
  const fn="Bestellung_"+o.id+"_"+o.supplier.replace(/\s+/g,"_")+"_"+o.date.replace(/\./g,"-")+".pdf";
  const subj="Bestellung "+o.id+" \u2013 Pavlova Cafe Berlin \u2013 "+o.date;
  const body="Guten Tag,\n\nanbei unsere Bestellung "+o.id+" vom "+o.date+" (PDF im Anhang).\n\nAnlieferung: "+o.delivDate+"\nBesteller: "+o.user+(o.note?"\nHinweis: "+o.note:"")+"\n\nMit freundlichen Gr\u00fc\u00dfen\nPavlova Cafe Berlin\nKurf\u00fcrstendamm 210, 10719 Berlin\nTel: 030 85621805";
  bestellungen.unshift(o);wk={};
  if(document.getElementById("notiz"))document.getElementById("notiz").value="";
  wBadge();bBadge();
  const ok=await apiSend(o,b64,fn,subj,body,sup.email);
  if(!ok){const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});buildPDFContent(doc,o);doc.save(fn);const ml2="mailto:"+sup.email+"?cc="+encodeURIComponent(CC)+"&subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);setTimeout(()=>{window.location.href=ml2;},600);mel("PDF gespeichert \u2013 E-Mail \u00f6ffnet sich");}
  setTimeout(()=>go("bestellungen"),900);
}
async function apiSend(o,b64,fn,subj,body,to){const url=(localStorage.getItem("pv_srv")||"").replace(/\/+$/,"");if(!url)return false;try{mel("Bestellung wird gesendet\u2026");const r=await fetch(url+"/api/send-order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to,cc:CC,subject:subj,body,pdfBase64:b64,pdfFilename:fn,orderId:o.id}),signal:AbortSignal.timeout(15000)});const d=await r.json();if(d.ok){mel("\u2705 "+o.id+" gesendet!");return true;}mel("\u26a0\ufe0f "+d.error);return false;}catch(e){mel("\u26a0\ufe0f Kein Server \u2013 Fallback");return false;}}

// BESTELLUNGEN VIEW
function renderBestellungen(){
  let h=`<div style="padding:14px;">`;
  if(!bestellungen.length){h+=`<div style="text-align:center;padding:3rem 0;color:#666;">Noch keine Bestellungen</div>`;h+=`</div>`;return h;}
  bestellungen.forEach(b=>{
    const f=b.status==="offen"?"#EF9F27":b.status==="bestaetigt"?"#1D9E75":"#888780";
    const t=b.status==="offen"?"Offen":b.status==="bestaetigt"?"Best\u00e4tigt":"Geliefert";
    const bg=b.status==="offen"?"#FAEEDA":b.status==="bestaetigt"?"#E1F5EE":"#f5f4f2";
    const tc=b.status==="offen"?"#854F0B":b.status==="bestaetigt"?"#0F6E56":"#666";
    const sup=SUPPLIERS[b.supplier];const ml2="mailto:"+(sup?sup.email:"")+"?cc="+encodeURIComponent(CC)+"&subject="+encodeURIComponent("Bestellung "+b.id);
    h+=`<div style="background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:13px;margin-bottom:9px;">`;
    h+=`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;"><div style="width:8px;height:8px;border-radius:50%;background:${f};flex-shrink:0;"></div><span style="font-size:13px;font-weight:600;">${b.id}</span><span style="font-size:11px;padding:2px 7px;border-radius:7px;background:#f5f4f2;color:#666;">${b.supplier}</span><button onclick="bStatus('${b.id}')" style="font-size:11px;padding:2px 7px;border-radius:7px;background:${bg};color:${tc};border:none;cursor:pointer;">${t}</button></div>`;
    h+=`<div style="font-size:12px;color:#666;margin-bottom:7px;">${b.date} ${b.time} · ${b.user} · ${b.items.length} Artikel${b.note?" · \""+b.note.substring(0,20)+"\"":""}</div>`;
    h+=`<div style="display:flex;gap:7px;"><button onclick="bPdf('${b.id}')" style="font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid rgba(0,0,0,0.18);background:transparent;color:#666;cursor:pointer;">PDF herunterladen</button><button onclick="window.location.href='${ml2.replace(/'/g,"\\'")}'" style="font-size:12px;padding:5px 11px;border-radius:8px;border:1px solid rgba(0,0,0,0.18);background:transparent;color:#666;cursor:pointer;">E-Mail senden</button></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;return h;
}
function bShow(){document.getElementById("inhalt").innerHTML=renderBestellungen();}
function bStatus(id){const b=bestellungen.find(x=>x.id===id);if(!b)return;const f=["offen","bestaetigt","geliefert"];b.status=f[(f.indexOf(b.status)+1)%3];bShow();}
function bPdf(id){const b=bestellungen.find(x=>x.id===id);if(!b)return;const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});buildPDFContent(doc,b);doc.save("Bestellung_"+b.id+".pdf");mel("PDF gespeichert");}

// EINSTELLUNGEN VIEW
function renderEinstellungen(){
  let h=`<div style="padding:14px;">`;
  
  // Server & Email
  h+=`<div style="${tit.replace('margin:18px 0 9px','margin:0 0 9px')}">Server & E-Mail</div>`;
  h+=`<div style="${card}"><div style="${row}last-child:border:none;"><div style="flex:1;"><div style="font-size:14px;">Server-Verbindung</div><div id="srvTxt" style="font-size:12px;color:#666;margin-top:1px;">Nicht verbunden</div></div><div id="srvDot" style="width:9px;height:9px;border-radius:50%;background:#E24B4A;flex-shrink:0;"></div></div></div>`;
  h+=`<div style="background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:13px;margin-bottom:9px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:5px;">Server-URL (Render.com)</div><input id="srvUrl" placeholder="https://pavlova-server.onrender.com" style="${inp}"><div style="display:flex;gap:7px;margin-top:9px;"><button onclick="srvSave()" style="${btn}flex:1;">Speichern</button><button onclick="srvTest()" style="${btnS}flex:1;">Testen</button></div></div>`;
  
  h+=`<div style="${tit}">SMTP-Einstellungen</div>`;
  h+=`<div style="background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:13px;margin-bottom:9px;">`;
  h+=`<div style="margin-bottom:11px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">SMTP-Host</div><input id="sHost" placeholder="mail.pavlovacafe.de" style="${inp}"></div>`;
  h+=`<div style="margin-bottom:11px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">Port</div><input id="sPort" type="number" placeholder="587" style="${inp}"></div>`;
  h+=`<div style="margin-bottom:11px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">Benutzername</div><input id="sUser" placeholder="Bestellung@pavlovacafe.de" style="${inp}"></div>`;
  h+=`<div style="margin-bottom:11px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">Passwort</div><input id="sPass" type="password" placeholder="E-Mail Passwort" style="${inp}"></div>`;
  h+=`<div style="display:flex;gap:7px;"><button onclick="smtpSave()" style="${btn}flex:1;">Speichern</button><button onclick="smtpTest()" style="${btnS}flex:1;">SMTP testen</button></div>`;
  h+=`</div>`;
  
  h+=`<div style="background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:13px;margin-bottom:9px;">`;
  h+=`<div style="margin-bottom:11px;"><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">Absender – fest hinterlegt</div><input value="Bestellung@pavlovacafe.de" readonly style="${inp}background:#f5f4f2;color:#666;"></div>`;
  h+=`<div><div style="font-size:12px;color:#666;font-weight:500;margin-bottom:4px;">CC – automatisch bei jeder Bestellung</div><input value="Bestellung@pavlovacafe.de" readonly style="${inp}background:#f5f4f2;color:#666;"></div>`;
  h+=`</div>`;

  // Lieferanten
  h+=`<div style="${tit}">Lieferanten verwalten</div>`;
  h+=`<div style="${card}">`;
  Object.entries(SUPPLIERS).forEach(([n,s])=>{h+=`<div style="${row}"><div style="flex:1;"><div style="font-size:14px;">${n}</div><div style="font-size:12px;color:#666;margin-top:1px;">${s.email}</div></div><button onclick="lDel('${esc(n)}')" style="width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:#f5f4f2;color:#666;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;">×</button></div>`;});
  h+=`</div>`;
  h+=`<div style="${card}"><div style="padding:11px 13px;background:#f5f4f2;display:flex;flex-direction:column;gap:7px;"><input id="nLName" placeholder="Lieferantenname *" style="${inp}margin-top:0;"><input id="nLEmail" placeholder="E-Mail Adresse *" type="email" style="${inp}margin-top:0;"><input id="nLKat" placeholder="Erste Kategorie (z.B. Fleisch)" style="${inp}margin-top:0;"><button onclick="lAdd()" style="${btn}">+ Lieferant anlegen</button></div></div>`;

  // Mitarbeiter
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin:18px 0 9px;"><div style="${tit.replace('margin:18px 0 9px','margin:0')}">Mitarbeiter</div><button onclick="mReset()" style="font-size:11px;padding:3px 9px;border-radius:8px;border:1px solid rgba(0,0,0,0.2);background:transparent;color:#666;cursor:pointer;">Zurücksetzen</button></div>`;
  h+=`<div style="${card}">`;
  M.forEach(m=>{h+=`<div style="${row}"><div style="width:28px;height:28px;border-radius:50%;background:#B5D4F4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0C447C;flex-shrink:0;">${m.id}</div><div style="flex:1;font-size:14px;">${m.name}</div>${M.length>1?`<button onclick="mDel('${m.id}')" style="width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:#f5f4f2;color:#666;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;">×</button>`:""}`;h+=`</div>`;});
  h+=`</div>`;
  h+=`<div style="${card}"><div style="padding:11px 13px;background:#f5f4f2;display:flex;flex-direction:column;gap:7px;"><div style="display:flex;gap:7px;"><input id="nMName" placeholder="Name" style="${inp}margin-top:0;flex:1;"><input id="nMK" placeholder="Kürzel" style="${inp}margin-top:0;max-width:70px;"></div><button onclick="mAdd()" style="${btn}">+ Mitarbeiter hinzufügen</button></div></div>`;

  // Produkte
  h+=`<div style="${tit}">Produkte verwalten</div>`;
  h+=`<div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:5px;margin-bottom:9px;scrollbar-width:none;">`;
  Object.keys(SUPPLIERS).forEach(n=>{h+=`<button onclick="eLSet('${esc(n)}')" style="padding:4px 11px;font-size:12px;border-radius:15px;border:1px solid ${n===eL?"#1D9E75":"rgba(0,0,0,0.1)"};background:${n===eL?"#E1F5EE":"transparent"};color:${n===eL?"#0F6E56":"#666"};cursor:pointer;white-space:nowrap;flex-shrink:0;${n===eL?"font-weight:600;":""}">${n}</button>`;});
  h+=`</div>`;
  h+=`<div id="eProdListe" style="${card}"></div>`;
  h+=`<div style="${card}"><div style="padding:11px 13px;background:#f5f4f2;display:flex;flex-direction:column;gap:7px;"><input id="nPName" placeholder="Artikelname *" style="${inp}margin-top:0;"><div style="display:flex;gap:7px;"><input id="nPEinheit" placeholder="Einheit *" style="${inp}margin-top:0;max-width:90px;"><input id="nPKat" placeholder="Kategorie" style="${inp}margin-top:0;"><input id="nPNr" placeholder="Art.-Nr." style="${inp}margin-top:0;max-width:75px;"></div><input id="nPHinweis" placeholder="Hinweis (optional)" style="${inp}margin-top:0;"><button onclick="pAdd()" style="${btn}">+ Artikel hinzufügen</button></div></div>`;
  
  h+=`</div>`;return h;
}

function eInit(){document.getElementById("inhalt").innerHTML=renderEinstellungen();eProdRefresh();const u=localStorage.getItem("pv_srv");if(u&&document.getElementById("srvUrl"))document.getElementById("srvUrl").value=u;srvCheck();}
function eLSet(n){eL=n;eInit();}
function eProdRefresh(){const el=document.getElementById("eProdListe");if(!el)return;const sup=SUPPLIERS[eL];el.innerHTML=sup.products.map(p=>`<div style="${row}"><div style="flex:1;"><div style="font-size:14px;">${p.name}</div><div style="font-size:12px;color:#666;margin-top:1px;">${p.unit} · ${p.cat}${p.nr?" · Nr."+p.nr:""}${p.hint?" · "+p.hint:""}</div></div><button onclick="pDel(${p.id})" style="width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:#f5f4f2;color:#666;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;">×</button></div>`).join("")||`<div style="${row}"><div style="color:#666;font-size:13px;">Noch keine Artikel</div></div>`;}
function pAdd(){const n=(document.getElementById("nPName")||{value:""}).value.trim(),u=(document.getElementById("nPEinheit")||{value:""}).value.trim(),k=(document.getElementById("nPKat")||{value:""}).value.trim(),nr=(document.getElementById("nPNr")||{value:""}).value.trim(),h2=(document.getElementById("nPHinweis")||{value:""}).value.trim();if(!n||!u){mel("Name und Einheit sind Pflicht");return;}const sup=SUPPLIERS[eL],id=++nId;sup.products.push({id,nr,name:n,unit:u,cat:k||sup.cats[0]||"Allgemein",hint:h2});if(k&&!sup.cats.includes(k))sup.cats.push(k);save();eInit();}
function pDel(id){SUPPLIERS[eL].products=SUPPLIERS[eL].products.filter(p=>p.id!==id);delete wk[id];wBadge();save();eProdRefresh();}
function lAdd(){const n=(document.getElementById("nLName")||{value:""}).value.trim(),e=(document.getElementById("nLEmail")||{value:""}).value.trim(),k=(document.getElementById("nLKat")||{value:""}).value.trim()||"Allgemein";if(!n||!e){mel("Name und E-Mail sind Pflicht");return;}if(SUPPLIERS[n]){mel("Lieferant existiert bereits");return;}SUPPLIERS[n]={email:e,cats:[k],products:[]};save();eInit();}
function lDel(n){if(!confirm(n+" löschen?"))return;delete SUPPLIERS[n];if(curL===n)curL=Object.keys(SUPPLIERS)[0];if(eL===n)eL=Object.keys(SUPPLIERS)[0];save();eInit();go("bestellen");setTimeout(()=>go("einstellungen"),100);}
function mAdd(){const n=(document.getElementById("nMName")||{value:""}).value.trim();let k=(document.getElementById("nMK")||{value:""}).value.trim().toUpperCase();if(!n)return;if(!k)k=n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();if(M.find(m=>m.id===k))k=k+(M.length+1);M.push({id:k,name:n});save();eInit();}
function mDel(id){if(aN.id===id){mel("Aktiven Nutzer nicht löschbar");return;}M=M.filter(m=>m.id!==id);save();eInit();}
function mReset(){if(!confirm("Zurücksetzen?"))return;M=[...STD_M];aN=M[0];document.getElementById("uK").textContent=aN.id;document.getElementById("uN").textContent=aN.name;save();eInit();}

function srvSave(){const u=(document.getElementById("srvUrl")||{value:""}).value.trim().replace(/\/+$/,"");if(!u){mel("Bitte URL eingeben");return;}localStorage.setItem("pv_srv",u);mel("Server-URL gespeichert");srvCheck();}
async function srvTest(){const u=((document.getElementById("srvUrl")||{value:""}).value.trim()||localStorage.getItem("pv_srv")||"").replace(/\/+$/,"");if(!u){mel("Bitte URL eintragen");return;}mel("Verbindung wird getestet\u2026");try{const r=await fetch(u+"/api/status",{signal:AbortSignal.timeout(8000)});const d=await r.json();srvSet(d.ok,d.ok?"Verbunden \u2013 SMTP: "+(d.smtp&&d.smtp.configured?d.smtp.host:"nicht konfiguriert"):"Fehler");mel(d.ok?"\u2705 Server erreichbar!":"\u26a0\ufe0f "+d.error);}catch(e){srvSet(false,"Nicht erreichbar");mel("\u26a0\ufe0f Nicht erreichbar");}}
async function srvCheck(){const u=(localStorage.getItem("pv_srv")||"").replace(/\/+$/,"");if(!u)return;try{const r=await fetch(u+"/api/status",{signal:AbortSignal.timeout(5000)});const d=await r.json();srvSet(d.ok,d.ok?"Verbunden \u2013 "+(d.smtp&&d.smtp.configured?d.smtp.host+":"+d.smtp.port:"SMTP nicht konfiguriert"):"Fehler");}catch(e){srvSet(false,"Nicht erreichbar");}}
function srvSet(ok,t){const d=document.getElementById("srvDot"),tx=document.getElementById("srvTxt");if(d)d.style.background=ok?"#1D9E75":"#E24B4A";if(tx)tx.textContent=t;}
async function smtpSave(){const url=(localStorage.getItem("pv_srv")||"").replace(/\/+$/,"");if(!url){mel("Zuerst Server-URL speichern");return;}const cfg={host:(document.getElementById("sHost")||{value:""}).value.trim(),port:(document.getElementById("sPort")||{value:""}).value.trim(),user:(document.getElementById("sUser")||{value:""}).value.trim(),pass:(document.getElementById("sPass")||{value:""}).value.trim()};if(!cfg.host||!cfg.port||!cfg.user||!cfg.pass){mel("Alle SMTP-Felder ausfüllen");return;}try{const r=await fetch(url+"/api/smtp-config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg),signal:AbortSignal.timeout(8000)});const d=await r.json();mel(d.ok?"\u2705 SMTP gespeichert!":"\u26a0\ufe0f "+d.error);if(d.ok&&document.getElementById("sPass"))document.getElementById("sPass").value="";}catch(e){mel("\u26a0\ufe0f Server nicht erreichbar");}}
async function smtpTest(){const url=(localStorage.getItem("pv_srv")||"").replace(/\/+$/,"");if(!url){mel("Zuerst Server-URL speichern");return;}mel("SMTP wird getestet\u2026");try{const r=await fetch(url+"/api/smtp-test",{signal:AbortSignal.timeout(15000)});const d=await r.json();mel(d.ok?"\u2705 SMTP Verbindung erfolgreich!":"\u26a0\ufe0f "+d.error);}catch(e){mel("\u26a0\ufe0f Server nicht erreichbar");}}

// Start
load();
go("bestellen");
document.getElementById("uK").textContent=aN.id;
document.getElementById("uN").textContent=aN.name;
</script>
